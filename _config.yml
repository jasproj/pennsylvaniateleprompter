# Jekyll Configuration

# Site settings
markdown: kramdown
theme: null

# Markdown settings
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true

# Exclude directories
exclude:
  - .git
  - .gitignore
  - README.md
  - .DS_Store

# Include files
include:
  - blog

# Permalink structure (keep original URLs)
permalink: /:path/

# Build settings
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Keep HTML files as-is
keep_files:
  - blog
  - gallery-01.jpg
  - gallery-02.jpg
  - gallery-03.jpg
  - gallery-04.jpg
  - gallery-05.jpg
  - gallery-06.jpg
  - gallery-07.jpg
  - gallery-08.jpg
  - gallery-09.jpg
  - gallery-10.jpg
  - gallery-11.jpg
  - gallery-12.jpg
  - gallery-13.jpg
  - gallery-14.jpg
  - gallery-15.jpg
  - gallery-16.jpg
  - gallery-17.jpg
  - gallery-18.jpg
  - gallery-19.jpg
  - gallery-20.jpg
  - gallery-21.jpg
  - gallery-22.jpg
  - gallery-23.jpg
  - gallery-24.jpg
  - gallery-25.jpg
  - gallery-26.jpg

# Build output
source: .
destination: _site

